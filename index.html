<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stone Bridge Mirth — Maintenance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0d1117;
--card:#161b22;
--border:#30363d;
--accent:#e8c96b;
--text:#e6edf3;
--muted:#8b949e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Outfit;
background:var(--bg);
color:var(--text);
}

.wrap{
max-width:1200px;
margin:auto;
padding:30px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

h1{
font-weight:500;
}

select{
padding:10px 14px;
background:var(--card);
border:1px solid var(--border);
color:white;
border-radius:8px;
}

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:40px;
}

.kpi{
background:var(--card);
padding:24px;
border-radius:12px;
border:1px solid var(--border);
}

.kpi-label{
font-size:12px;
color:var(--muted);
margin-bottom:10px;
}

.kpi-value{
font-size:28px;
font-weight:500;
color:var(--accent);
}

.section{
background:var(--card);
border:1px solid var(--border);
border-radius:12px;
margin-bottom:40px;
}

.section h2{
padding:20px;
margin:0;
border-bottom:1px solid var(--border);
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px 20px;
border-bottom:1px solid var(--border);
text-align:left;
}

th{
color:var(--muted);
font-size:12px;
text-transform:uppercase;
}

tr:hover{
background:#1c2330;
}

.amount{
font-family:monospace;
}

.expense-row{
display:flex;
justify-content:space-between;
padding:12px 20px;
border-bottom:1px solid var(--border);
}

</style>

</head>

<body>

<div class="wrap">

<header>

<h1>🏛 Stone Bridge Mirth</h1>

<select id="monthSelect"></select>

</header>

<div class="kpi-grid" id="kpis"></div>

<div class="section">

<h2>Flat Payments</h2>

<table>

<thead>
<tr>
<th>Flat</th>
<th>Deposit</th>
<th>Electricity</th>
<th>Total</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>

</table>

</div>

<div class="section">

<h2>Expenses</h2>

<div id="expenses"></div>

</div>

</div>

<script>

const SHEET_ID="1xMVeCAiWuDi3SZBxU4xiD-rW68ygJXXqepGbDPp8PXs"

const MONTHS=[
{name:"January",gid:"0"},
{name:"February",gid:"123456"},
{name:"March",gid:"234567"}
]

const select=document.getElementById("monthSelect")

MONTHS.forEach(m=>{
const o=document.createElement("option")
o.value=m.gid
o.textContent=m.name
select.appendChild(o)
})

function parseCSV(text){
return text.trim().split("\n").map(r=>r.split(","))
}

function money(n){
return "₹"+Number(n).toLocaleString("en-IN")
}

async function loadMonth(gid){

const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`

const res=await fetch(url)
const text=await res.text()

const rows=parseCSV(text)

const openingBalance=parseFloat(rows[0][1])||0

const paymentRows=rows.slice(3).filter(r=>r[0])

let depositTotal=0
let electricityTotal=0

const tbody=document.getElementById("paymentTable")
tbody.innerHTML=""

paymentRows.forEach(r=>{

const flat=r[0]

const deposit=parseFloat(r[1])||0
const electricity=parseFloat(r[2])||0

depositTotal+=deposit
electricityTotal+=electricity

const total=deposit+electricity

tbody.innerHTML+=`
<tr>
<td>${flat}</td>
<td class="amount">${money(deposit)}</td>
<td class="amount">${money(electricity)}</td>
<td class="amount">${money(total)}</td>
</tr>
`

})

const expensesStart=paymentRows.length+4

let expenseTotal=0
const expenseDiv=document.getElementById("expenses")
expenseDiv.innerHTML=""

rows.slice(expensesStart).forEach(r=>{

const name=r[0]
const amount=parseFloat(r[1])||0

expenseTotal+=amount

expenseDiv.innerHTML+=`
<div class="expense-row">
<span>${name}</span>
<span class="amount">${money(amount)}</span>
</div>
`

})

const collected=depositTotal+electricityTotal

const closing=openingBalance+collected-expenseTotal

document.getElementById("kpis").innerHTML=`

<div class="kpi">
<div class="kpi-label">Opening Balance</div>
<div class="kpi-value">${money(openingBalance)}</div>
</div>

<div class="kpi">
<div class="kpi-label">Deposit Collected</div>
<div class="kpi-value">${money(depositTotal)}</div>
</div>

<div class="kpi">
<div class="kpi-label">Electricity Collected</div>
<div class="kpi-value">${money(electricityTotal)}</div>
</div>

<div class="kpi">
<div class="kpi-label">Expenses</div>
<div class="kpi-value">${money(expenseTotal)}</div>
</div>

<div class="kpi">
<div class="kpi-label">Closing Balance</div>
<div class="kpi-value">${money(closing)}</div>
</div>

`

}

select.addEventListener("change",e=>loadMonth(e.target.value))

loadMonth(MONTHS[0].gid)

</script>

</body>

</html>
