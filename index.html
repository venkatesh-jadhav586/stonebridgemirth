<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>Apartment Maintenance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
background:#0d1117;
color:#e6edf3;
font-family:Outfit;
margin:0;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

select{
padding:10px;
border-radius:8px;
background:#161b22;
color:white;
border:1px solid #30363d;
}

.kpis{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#161b22;
padding:20px;
border-radius:10px;
border:1px solid #30363d;
}

.card-title{
font-size:12px;
color:#8b949e;
margin-bottom:6px;
}

.card-value{
font-size:26px;
color:#e8c96b;
}

.section{
background:#161b22;
border:1px solid #30363d;
border-radius:10px;
margin-bottom:30px;
}

.section h2{
padding:15px;
margin:0;
border-bottom:1px solid #30363d;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #30363d;
text-align:left;
}

th{
font-size:12px;
color:#8b949e;
text-transform:uppercase;
}

tr:hover{
background:#1c2330;
}

.amount{
font-family:monospace;
}

.expense-row{
display:flex;
justify-content:space-between;
padding:12px 15px;
border-bottom:1px solid #30363d;
}

</style>

</head>

<body>

<div class="container">

<header>

<h1>🏛 Stone Bridge Mirth</h1>

<select id="monthSelect"></select>

</header>

<div class="kpis" id="kpis"></div>

<div class="section">

<h2>Flat Payments</h2>

<table>

<thead>
<tr>
<th>Flat</th>
<th>Deposit</th>
<th>Electricity</th>
<th>Total</th>
<th>Remarks</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>

</table>

</div>

<div class="section">

<h2>Expenses</h2>

<div id="expenses"></div>

</div>

</div>

<script>

const SHEET_ID="1xMVeCAiWuDi3SZBxU4xiD-rW68ygJXXqepGbDPp8PXs"

const MONTHS=[
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
]

const YEAR=2026

const select=document.getElementById("monthSelect")

MONTHS.forEach(m=>{
const option=document.createElement("option")
option.value=m
option.textContent=m+" "+YEAR
select.appendChild(option)
})

function money(n){
return "₹"+Number(n).toLocaleString("en-IN")
}

function parseCSV(text){
return text.trim().split("\n").map(r=>r.split(","))
}

async function loadMonth(month){

const sheetName=`${month}_${YEAR}`

const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`

const res=await fetch(url)

const text=await res.text()

const rows=parseCSV(text)

const openingBalance=parseFloat(rows[0][1])||0

let i=2

let payments=[]

while(rows[i] && rows[i][0]!="EXPENSES"){
payments.push(rows[i])
i++
}

let expenses=[]

i+=2

while(rows[i] && rows[i][0]){
expenses.push(rows[i])
i++
}

let depositTotal=0
let electricityTotal=0

const tbody=document.getElementById("paymentTable")
tbody.innerHTML=""

payments.forEach(r=>{

const flat=r[0]
const deposit=parseFloat(r[1])||0
const electricity=parseFloat(r[2])||0
const remark=r[3]||""

depositTotal+=deposit
electricityTotal+=electricity

const total=deposit+electricity

tbody.innerHTML+=`
<tr>
<td>${flat}</td>
<td class="amount">${money(deposit)}</td>
<td class="amount">${money(electricity)}</td>
<td class="amount">${money(total)}</td>
<td>${remark}</td>
</tr>
`

})

let expenseTotal=0

const expenseDiv=document.getElementById("expenses")
expenseDiv.innerHTML=""

expenses.forEach(r=>{

const name=r[0]
const amount=parseFloat(r[1])||0

expenseTotal+=amount

expenseDiv.innerHTML+=`
<div class="expense-row">
<span>${name}</span>
<span class="amount">${money(amount)}</span>
</div>
`

})

const collected=depositTotal+electricityTotal

const closing=openingBalance+collected-expenseTotal

document.getElementById("kpis").innerHTML=`

<div class="card">
<div class="card-title">Opening Balance</div>
<div class="card-value">${money(openingBalance)}</div>
</div>

<div class="card">
<div class="card-title">Deposit Collected</div>
<div class="card-value">${money(depositTotal)}</div>
</div>

<div class="card">
<div class="card-title">Electricity Collected</div>
<div class="card-value">${money(electricityTotal)}</div>
</div>

<div class="card">
<div class="card-title">Expenses</div>
<div class="card-value">${money(expenseTotal)}</div>
</div>

<div class="card">
<div class="card-title">Closing Balance</div>
<div class="card-value">${money(closing)}</div>
</div>

`

}

select.addEventListener("change",e=>loadMonth(e.target.value))

loadMonth("Jan")

</script>

</body>
</html>
